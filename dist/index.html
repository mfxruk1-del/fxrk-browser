<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self';" />
    <title>FXRK Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
    <style>
      /* Critical inline styles to prevent FOUC */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        color: #e0e0e0;
        font-family: 'JetBrains Mono', monospace;
      }
      /* Loading screen */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
        gap: 16px;
      }
      #loading .logo {
        font-family: 'JetBrains Mono', monospace;
        font-size: 32px;
        font-weight: 800;
        color: #00ff41;
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        letter-spacing: 8px;
      }
      #loading .tagline {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: #444;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      #loading .bar {
        width: 200px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 1px;
        overflow: hidden;
      }
      #loading .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #00ff41, #bc13fe);
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes loading {
        0% { width: 0%; margin-left: 0%; }
        50% { width: 60%; margin-left: 20%; }
        100% { width: 0%; margin-left: 100%; }
      }
    </style>
    <script type="module" crossorigin src="./assets/main-Cfof2ZyQ.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-C9JTnDRD.css">
  </head>
  <body>
    <div id="loading">
      <div class="logo">FXRK</div>
      <div class="tagline">Privacy Browser</div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
    <div id="root"></div>
  </body>
</html>
